# ─────────────────────────────────────────────────────────────────────────────
# Observability stack — Prometheus (metrics) + Tempo (traces) + Grafana (UI) +
# exporters (Postgres / Redis / host / containers). Runs ALONGSIDE the app; it
# does not modify or restart the app.
#
#   docker compose -f observability/docker-compose.observability.yml --env-file observability/.env up -d
#
# It joins the app's existing docker network so Prometheus can scrape the backend
# by service name and the backend can push traces to tempo:4318.
# Set APP_NETWORK to your app compose network (default: data_pipeline_default).
# ─────────────────────────────────────────────────────────────────────────────
name: rayna-observability

networks:
  appnet:
    external: true
    name: ${APP_NETWORK:-data_pipeline_default}

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ['9090:9090']
    networks: [appnet]

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ['-config.file=/etc/tempo/tempo.yaml']
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - '3200:3200'   # Tempo query API (Grafana datasource)
      - '4318:4318'   # OTLP/HTTP receiver — backend sends traces here
      - '4317:4317'   # OTLP/gRPC receiver
    networks: [appnet]

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ['3002:3000']   # host 3002 to avoid clashing with frontend:3000 / backend:3001
    networks: [appnet]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${PG_EXPORTER_DSN}   # e.g. postgresql://user:pass@host:5432/postgres?sslmode=require
    ports: ['9187:9187']
    networks: [appnet]

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis://redis:6379}
    ports: ['9121:9121']
    networks: [appnet]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    command: ['--path.rootfs=/host']
    volumes:
      - '/:/host:ro,rslave'
    ports: ['9100:9100']
    networks: [appnet]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports: ['8081:8080']   # host 8081 to avoid clashing with other services on 8080
    networks: [appnet]
