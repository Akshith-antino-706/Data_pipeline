apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Link a trace's spans to Prometheus metrics (exemplars) and back.
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
