<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{title}} — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Baloo+2:wght@400;500&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#2F2F2F;
    background:linear-gradient(178.51deg, #FFFFFF 1.27%, #4E7DB5 46.24%);
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  /* Left white-to-transparent fade so the headline reads */
  .left-fade{
    position:absolute;top:0;left:0;width:65%;height:100%;z-index:1;
    background:linear-gradient(90deg, #FFFFFF 0%, rgba(255,255,255,0.85) 30%, rgba(255,255,255,0) 100%);
  }

  /* Upper text block */
  .upper{
    position:absolute;left:0;right:0;top:0;z-index:2;
    padding:80px;display:flex;flex-direction:column;gap:120px;
  }
  .logo{width:260px;height:auto;display:block}

  .text-block{display:flex;flex-direction:column;gap:32px;max-width:740px}
  .title{
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:57px;line-height:1.18;color:#2F2F2F;margin:0;
  }
  .description{
    font-family:'Baloo 2',sans-serif;font-weight:400;
    font-size:37px;line-height:1.6;color:#2F2F2F;margin:0;
  }

  /* Footer — gold gradient + contact strip */
  .footer{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    padding:30px 80px;height:203px;
    display:flex;flex-direction:column;justify-content:flex-end;
    background:linear-gradient(180deg, rgba(166,152,51,0) 0%, #8B7F2C 100%);
  }
  .contact-strip{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    width:920px;height:40px;
  }
  .contact-strip .item{display:flex;align-items:center;gap:12px;color:#FFFFFF}
  .contact-strip span{
    font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;line-height:1.2;color:#FFFFFF;
  }
  .contact-strip .sep{width:1px;height:40px;background:#FFFFFF;opacity:0.3}
  .contact-strip svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.5}
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="left-fade"></div>

    <section class="upper">
      <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">
      <div class="text-block">
        <h1 class="title">{{title}}</h1>
        <p class="description">{{description}}</p>
      </div>
    </section>

    <footer class="footer">
      <div class="contact-strip">
        <div class="item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <span>{{websiteUrl}}</span>
        </div>
        <div class="sep"></div>
        <div class="item">
          <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
          <span>{{phoneNumber}}</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
