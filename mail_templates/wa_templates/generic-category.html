<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{category}} — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#fff;background:#000;
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  .top-shade{
    position:absolute;top:0;left:0;right:0;height:745px;z-index:1;
    background:linear-gradient(181.92deg, {{topShadeColor}} 8.28%, rgba(0,0,0,0) 90.48%);
  }
  .bottom-shade{
    position:absolute;left:0;right:0;bottom:0;height:308px;z-index:1;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, {{bottomShadeColor}} 100%);
  }

  .upper{
    position:absolute;left:0;right:0;top:80px;z-index:2;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    gap:80px;padding:0 80px;
  }
  .logo{width:260px;height:auto;display:block;margin:0 auto}

  .title-block{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:920px}
  .category-title{
    font-family:'Cinzel',serif;font-weight:700;
    font-size:80px;line-height:108px;color:#FFFFFF;
    text-transform:uppercase;letter-spacing:1px;margin:0;
  }
  .category-sub{
    font-family:'DM Sans',sans-serif;font-weight:500;
    font-size:34px;line-height:1.2;color:#FFFFFF;margin:0;max-width:686px;
  }

  .contact-strip{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;align-items:center;justify-content:space-between;gap:32px;
    padding:24px 80px;height:88px;
    backdrop-filter:blur(27px);-webkit-backdrop-filter:blur(27px);
  }
  .contact-strip .item{display:flex;align-items:center;gap:8px;color:#FFF9F0}
  .contact-strip span{
    font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;line-height:1.2;color:#FFF9F0;
  }
  .contact-strip .sep{width:1px;height:40px;background:#FFFFFF;opacity:0.3}
  .contact-strip svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.5}
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="top-shade"></div>
    <div class="bottom-shade"></div>

    <section class="upper">
      <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">
      <div class="title-block">
        <h1 class="category-title">{{category}}</h1>
        <p class="category-sub">{{headline}}</p>
      </div>
    </section>

    <div class="contact-strip">
      <div class="item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        <span>{{websiteUrl}}</span>
      </div>
      <div class="sep"></div>
      <div class="item">
        <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
        <span>{{phoneNumber}}</span>
      </div>
    </div>
  </div>
</body>
</html>
