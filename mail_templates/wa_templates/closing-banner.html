<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{headline}} — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@500;600;700&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#fff;background:#000;
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  .scrim{position:absolute;inset:0;z-index:1;background:rgba(0,0,0,0.50)}

  .logo{
    position:absolute;left:50%;top:140px;transform:translateX(-50%);z-index:2;
    width:260px;height:auto;display:block;
  }

  .head-block{
    position:absolute;left:0;right:0;top:480px;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:30px;
    text-align:center;padding:0 80px;
  }
  .headline{
    font-family:'Inter',sans-serif;font-weight:600;
    font-size:42px;line-height:1.4;color:#FFFFFF;margin:0;
  }
  .accent{
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:72px;line-height:1.2;color:#FFCF62;margin:0;
  }

  .cta-btn{
    position:absolute;left:50%;top:1000px;transform:translateX(-50%);z-index:2;
    display:flex;align-items:center;justify-content:center;
    padding:20px 56px;
    background:#FFFFFF;color:#1A1A1A;
    box-shadow:0 4px 16px rgba(0,0,0,0.30);border-radius:12px;
    font-family:'Inter',sans-serif;font-weight:700;font-size:32px;line-height:1.2;
  }

  .contact-strip{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 80px;height:88px;gap:32px;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%);
  }
  .contact-strip .item{display:flex;align-items:center;gap:10px;color:#FFF9F0}
  .contact-strip span{
    font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;line-height:1.2;color:#FFF9F0;
  }
  .contact-strip svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.5}
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="scrim"></div>

    <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">

    <div class="head-block">
      <p class="headline">{{headline}}</p>
      <p class="accent">{{sub}}</p>
    </div>

    <span class="cta-btn">{{buttonText}}</span>

    <div class="contact-strip">
      <div class="item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        <span>{{websiteUrl}}</span>
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
        <span>{{phoneNumber}}</span>
      </div>
    </div>
  </div>
</body>
</html>
