<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Apply Your Visa — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'Inter',system-ui,sans-serif;color:#fff;background:#000;
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  .scrim{position:absolute;inset:0;z-index:1;background:rgba(31,31,31,0.85)}

  .head-block{
    position:absolute;left:0;right:0;top:388px;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:25px;
    text-align:center;padding:0 80px;
  }
  .headline{
    font-family:'Inter',sans-serif;font-weight:600;
    font-size:37px;line-height:1.4;color:#FFFFFF;margin:0;
  }
  .accent{
    font-family:'Inter',sans-serif;font-weight:900;
    font-size:45px;line-height:1.4;color:{{accentColor}};margin:0;
  }

  .with-row{
    position:absolute;left:0;right:0;top:553px;z-index:2;
    display:flex;align-items:center;justify-content:center;gap:11px;
  }
  .with-line{width:137px;height:4px}
  .with-line.left{background:linear-gradient(90deg, rgba(255,255,255,0) 22%, #FFFFFF 100%)}
  .with-line.right{background:linear-gradient(90deg, #FFFFFF 0%, rgba(255,255,255,0) 78%)}
  .with-label{
    font-family:'Inter',sans-serif;font-weight:600;
    font-size:37px;line-height:1.4;color:#FFFFFF;
  }

  .logo{
    position:absolute;left:50%;top:630px;transform:translateX(-50%);z-index:2;
    width:468px;height:auto;display:block;
  }

  .trust-strip{
    position:absolute;left:60px;right:60px;top:880px;z-index:2;
    display:flex;align-items:center;justify-content:space-around;gap:5px;
    height:86px;padding:14px 23px;
    background:#1C1C1C;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    border-radius:30px;
  }
  .trust-item{display:flex;align-items:center;gap:8px;color:#fff}
  .trust-item .icon{
    width:58px;height:58px;border-radius:50%;flex-shrink:0;
    background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;font-size:22px;font-weight:700;
  }
  .trust-item .label{
    font-family:'Inter',sans-serif;font-weight:700;font-size:20px;line-height:1.4;color:#fff;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="scrim"></div>

    <div class="head-block">
      <p class="headline">{{headline}}</p>
      <p class="accent">{{accent}}</p>
    </div>

    <div class="with-row">
      <span class="with-line left"></span>
      <span class="with-label">{{withLabel}}</span>
      <span class="with-line right"></span>
    </div>

    <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">

    <div class="trust-strip">
      <div class="trust-item"><div class="icon">★</div><div class="label">4.9+ Rated<br>Experiences</div></div>
      <div class="trust-item"><div class="icon">♥</div><div class="label">25M+ Customer<br>served &amp; counting</div></div>
      <div class="trust-item"><div class="icon">◎</div><div class="label">1000+ Experiences<br>to choose from</div></div>
    </div>
  </div>
</body>
</html>
