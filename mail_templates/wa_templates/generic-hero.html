<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Your dream holiday — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Chivo:wght@400;500&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#fff;
    background:linear-gradient(180deg,#5487B2 1.31%,#2675AC 9.3%);
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  .top-shade{
    position:absolute;top:0;left:0;right:0;height:530px;z-index:1;
    background:linear-gradient(181.92deg, rgba(0,0,0,0.80) 8.28%, rgba(0,0,0,0.05) 90.48%);
  }

  .upper{
    position:absolute;left:0;right:0;top:0;z-index:2;
    padding:80px;display:flex;flex-direction:column;gap:100px;
  }
  .logo{width:260px;height:auto;display:block}

  .text-block{display:flex;flex-direction:column;gap:32px;max-width:920px}
  .headline{
    font-family:'Cinzel',serif;font-weight:700;
    font-size:80px;line-height:94px;color:#FFFFFF;margin:0;
  }
  .divider{width:110px;height:2px;background:#9D7F53;border:0;margin:0}
  .item-list{
    display:flex;flex-direction:column;gap:8px;list-style:none;padding:0;margin:0;
    backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-radius:12px;
  }
  .item-list li{
    font-family:'Chivo',sans-serif;font-weight:400;font-size:28px;line-height:1.5;
    text-transform:uppercase;color:#FFFFFF;letter-spacing:0.5px;
  }

  .footer{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;flex-direction:column;
  }
  .trust-strip{
    display:flex;align-items:center;justify-content:space-between;gap:32px;
    padding:0 80px;height:88px;
    background:rgba(8,12,2,0.10);
    backdrop-filter:blur(27px);-webkit-backdrop-filter:blur(27px);
  }
  .trust-item{display:flex;align-items:center;gap:12px;color:#fff}
  .trust-item .icon{
    width:62px;height:62px;border-radius:50%;flex-shrink:0;
    background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-size:24px;
  }
  .trust-item .label{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:20px;line-height:1.4;color:#FFFFFF;
  }
  .trust-divider{width:1px;height:48px;background:#A7A7A7;flex-shrink:0}

  .contact-strip{
    display:flex;align-items:center;justify-content:space-between;gap:32px;
    padding:24px 80px;height:88px;
    backdrop-filter:blur(27px);-webkit-backdrop-filter:blur(27px);
  }
  .contact-strip .item{display:flex;align-items:center;gap:8px;color:#FFF9F0}
  .contact-strip span{
    font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;line-height:1.2;color:#FFF9F0;
  }
  .contact-strip .sep{width:1px;height:40px;background:#9D7F53;opacity:0.3}
  .contact-strip svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.5}
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="top-shade"></div>

    <section class="upper">
      <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">
      <div class="text-block">
        <h1 class="headline">{{headline}}</h1>
        <hr class="divider">
        <ul class="item-list">
          <li>Activity</li>
          <li>Tours</li>
          <li>Cruises</li>
          <li>Visas</li>
        </ul>
      </div>
    </section>

    <footer class="footer">
      <div class="trust-strip">
        <div class="trust-item"><div class="icon">★</div><div class="label">4.9+ Rated<br>Experiences</div></div>
        <div class="trust-divider"></div>
        <div class="trust-item"><div class="icon">◎</div><div class="label">1000+ Experiences<br>to Choose from</div></div>
        <div class="trust-divider"></div>
        <div class="trust-item"><div class="icon">♥</div><div class="label">25M+ Customer<br>Served &amp; Counting</div></div>
      </div>
      <div class="contact-strip">
        <div class="item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <span>{{websiteUrl}}</span>
        </div>
        <div class="sep"></div>
        <div class="item">
          <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
          <span>{{phoneNumber}}</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
