<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{title}} — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Serif+Display&family=Average&family=DM+Sans:wght@500;700&family=Baloo+2:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#2F2F2F;background:#fff;
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  /* White left fade so the title reads cleanly — horizontal gradient, no rotation */
  .left-fade{
    position:absolute;top:0;left:0;width:75%;height:100%;z-index:1;
    background:linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 30%, rgba(255,255,255,0.50) 65%, rgba(255,255,255,0) 100%);
  }

  /* Upper block (logo + title + subtitle) */
  .upper{
    position:absolute;left:0;top:0;z-index:2;
    padding:64px;display:flex;flex-direction:column;gap:100px;
    width:1080px;
  }
  .logo{width:260px;height:auto;display:block}

  .text-block{display:flex;flex-direction:column;gap:24px;max-width:660px}
  .title{
    font-family:'Playfair Display',serif;font-weight:700;
    font-size:80px;line-height:1.2;color:#2F2F2F;
    text-transform:uppercase;margin:0;
  }
  .subtitle{
    font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
    font-size:44px;line-height:1.4;color:#2F2F2F;margin:0;
  }

  /* Coupon badge — top-right round badge */
  .coupon{
    position:absolute;left:815px;top:515px;z-index:3;
    box-sizing:border-box;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    width:200px;height:200px;padding:8px;
    background:linear-gradient(270deg, #C1A578 0%, #8D662B 93.17%);
    border:1px solid #C1A578;border-radius:170px;
  }
  .coupon-inner{
    box-sizing:border-box;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    width:184px;height:184px;padding:24px;gap:16px;
    border:1px solid #B2B2B2;border-radius:160px;
  }
  .coupon-code{
    font-family:'Average',serif;font-weight:400;
    font-size:20px;line-height:24px;color:#FFFFFF;
    text-align:center;text-transform:uppercase;text-decoration:underline;
  }
  .coupon-percent{display:flex;align-items:flex-end;gap:4px}
  .coupon-percent .num{
    font-family:'DM Serif Display',serif;font-weight:400;
    font-size:54px;line-height:1;color:#000000;
  }
  .coupon-percent .off{
    font-family:'DM Serif Display',serif;font-weight:400;
    font-size:19px;line-height:1.4;color:#000000;
  }

  /* Footer gold-gradient */
  .footer{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;flex-direction:column;align-items:center;
    padding:0 80px 30px;gap:32px;height:212px;
    background:linear-gradient(180deg, rgba(91,110,10,0) 0%, #5B6E0A 100%);
  }
  /* Frosted trust pill */
  .trust-pill{
    box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;gap:32px;
    width:829px;height:110px;padding:24px 32px;
    background:rgba(255,255,255,0.80);
    border:1px solid rgba(200,167,95,0.6);
    backdrop-filter:blur(27px);-webkit-backdrop-filter:blur(27px);
    border-radius:24px;
  }
  .trust-item{display:flex;align-items:center;gap:10px;color:#000}
  .trust-item .icon{
    width:62px;height:62px;border-radius:50%;flex-shrink:0;
    background:rgba(0,0,0,0.08);border:1px solid rgba(0,0,0,0.15);
    color:#5B6E0A;display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  }
  .trust-item .label{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:18px;line-height:1.33;color:#000;
  }
  .trust-divider{width:1px;height:48px;background:#B8B8B8;flex-shrink:0}

  /* Contact strip white text */
  .contact-strip{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    width:920px;height:40px;
  }
  .contact-strip .item{display:flex;align-items:center;gap:12px;color:#FFFFFF}
  .contact-strip span{
    font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;line-height:1.2;color:#FFFFFF;
  }
  .contact-strip .sep{width:1px;height:40px;background:#FFFFFF;opacity:0.3}
  .contact-strip svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.5}
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="left-fade"></div>

    <section class="upper">
      <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">
      <div class="text-block">
        <h1 class="title">{{title}}</h1>
        <p class="subtitle">{{subtitle}}</p>
      </div>
    </section>

    <div class="coupon">
      <div class="coupon-inner">
        <div class="coupon-code">{{couponCode}}</div>
        <div class="coupon-percent">
          <span class="num">{{discountValue}}%</span>
          <span class="off">off</span>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="trust-pill">
        <div class="trust-item"><div class="icon">★</div><div class="label">4.9+ Rated<br>Experiences</div></div>
        <div class="trust-divider"></div>
        <div class="trust-item"><div class="icon">◎</div><div class="label">1000+ Experiences<br>to choose from</div></div>
        <div class="trust-divider"></div>
        <div class="trust-item"><div class="icon">♥</div><div class="label">25M+ Customer<br>served &amp; counting</div></div>
      </div>
      <div class="contact-strip">
        <div class="item">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <span>{{websiteUrl}}</span>
        </div>
        <div class="sep"></div>
        <div class="item">
          <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
          <span>{{phoneNumber}}</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
