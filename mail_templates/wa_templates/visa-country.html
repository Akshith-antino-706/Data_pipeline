<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{country}} VISA — Rayna Tours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@500;600&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    width:1080px;height:1350px;overflow:hidden;
    font-family:'DM Sans',system-ui,sans-serif;color:#fff;background:#000;
  }
  .canvas{position:relative;width:1080px;height:1350px;overflow:hidden}

  .bg-img{
    position:absolute;inset:0;width:100%;height:100%;
    background-image:url('{{heroImage}}');
    background-size:cover;background-position:center;
    z-index:0;
  }
  .bottom-shade{
    position:absolute;left:0;right:0;bottom:0;height:623px;z-index:1;
    background:linear-gradient(180deg, rgba(2,2,2,0) 0%, #000000 100%);
  }

  .logo{
    position:absolute;top:37px;right:60px;z-index:3;
    width:190px;height:auto;
  }

  .title-row{
    position:absolute;left:0;right:0;top:1133px;z-index:2;
    display:flex;align-items:center;justify-content:center;
  }
  .country-frame{
    box-sizing:border-box;
    display:flex;align-items:center;justify-content:center;
    width:456px;height:105px;
    border:2px solid #FFFFFF;
    margin-right:-40px;
  }
  .country-name{
    font-family:'Oswald',sans-serif;font-weight:700;
    font-size:64px;line-height:1.2;color:#FFFFFF;
    text-transform:uppercase;letter-spacing:1px;
  }
  .flag{
    width:147px;height:145px;border-radius:50%;
    background-image:url('{{flagImage}}');
    background-size:cover;background-position:center;
    border:3px solid #FFFFFF;
    flex-shrink:0;
  }

  .sub-line{
    position:absolute;left:0;right:0;top:1290px;z-index:2;
    font-family:'Inter',sans-serif;font-weight:500;
    font-size:24px;line-height:1.2;color:#FFFFFF;
    text-align:center;margin:0;padding:0 80px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-img"></div>
    <div class="bottom-shade"></div>

    <img class="logo" src="{{logoUrl}}" alt="Rayna Tours">

    <div class="title-row">
      <div class="country-frame">
        <span class="country-name">{{country}} VISA</span>
      </div>
      <div class="flag"></div>
    </div>

    <p class="sub-line">{{subLine}}</p>
  </div>
</body>
</html>
