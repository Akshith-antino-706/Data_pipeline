<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rayna Tours">
  <!-- Rounded brand background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E2C4F"/>
      <stop offset="1" stop-color="#0A1E38"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Rayna "sail" fan: cyan, yellow, orange, red — fanning up from a common base -->
  <!-- Each blade is the same petal path, rotated around the pivot (32,49) -->
  <g>
    <path d="M0 0 C -6 -14 -3 -30 0 -39 C 3 -30 6 -14 0 0 Z" fill="#21B6E6"
          transform="translate(32 49) rotate(-31) scale(0.80)"/>
    <path d="M0 0 C -6 -14 -3 -30 0 -39 C 3 -30 6 -14 0 0 Z" fill="#FFCB05"
          transform="translate(32 49) rotate(-11) scale(1.00)"/>
    <path d="M0 0 C -6 -14 -3 -30 0 -39 C 3 -30 6 -14 0 0 Z" fill="#F7901E"
          transform="translate(32 49) rotate(10) scale(0.98)"/>
    <path d="M0 0 C -6 -14 -3 -30 0 -39 C 3 -30 6 -14 0 0 Z" fill="#E92D2A"
          transform="translate(32 49) rotate(31) scale(0.84)"/>
  </g>

  <!-- Serif-style "R" monogram base, echoing the wordmark -->
  <text x="32" y="60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">RAYNA</text>
</svg>
