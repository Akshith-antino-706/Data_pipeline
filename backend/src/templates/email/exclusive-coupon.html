<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Offer</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px 0;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">

<!-- Header -->
<tr><td style="background:#000000;padding:24px;text-align:center;">
  <img src="https://d1i3enf1i5tb1f.cloudfront.net/assets/rayna-logo-gold.png" alt="Rayna Tours" width="160" style="display:inline-block;">
</td></tr>

<!-- Hero -->
<tr><td style="padding:32px 24px;text-align:center;">
  <h1 style="color:#1a1a1a;font-size:24px;margin:0 0 12px;">{{email_heading}}</h1>
  <p style="color:#666;font-size:16px;line-height:1.5;margin:0 0 24px;">
    Hi {{customer_name}}, {{email_body}}
  </p>
</td></tr>

<!-- Coupon Box -->
{{#if coupon_code}}
<tr><td style="padding:0 24px 24px;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fdf6e3;border:2px dashed #c8a84e;border-radius:8px;">
  <tr><td style="padding:24px;text-align:center;">
    <p style="color:#666;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px;">Your Exclusive Code</p>
    <p style="color:#1a1a1a;font-size:32px;font-weight:bold;letter-spacing:3px;margin:0 0 8px;">{{coupon_code}}</p>
    <p style="color:#c8a84e;font-size:18px;font-weight:bold;margin:0 0 4px;">{{coupon_discount}}</p>
    {{#if coupon_expiry}}
    <p style="color:#e74c3c;font-size:13px;margin:0;">Expires in {{coupon_expiry}}</p>
    {{/if}}
  </td></tr>
  </table>
</td></tr>
{{/if}}

<!-- CTA -->
<tr><td style="padding:0 24px 32px;text-align:center;">
  <a href="https://www.raynatours.com" style="display:inline-block;background:#c8a84e;color:#000;font-size:16px;font-weight:bold;padding:14px 40px;border-radius:6px;text-decoration:none;">Explore & Book Now</a>
</td></tr>

<!-- Footer -->
<tr><td style="background:#1a1a1a;padding:20px 24px;text-align:center;">
  <p style="color:#999;font-size:12px;margin:0;">Rayna Tours &amp; Travels LLC | Dubai, UAE</p>
  <p style="color:#666;font-size:11px;margin:8px 0 0;">
    <a href="https://www.raynatours.com" style="color:#c8a84e;text-decoration:none;">raynatours.com</a>
  </p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
