<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Rayna Tours</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:480px;margin:24px auto;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #ececec;">
    <div style="background:#8b5cf6;padding:22px 24px;color:#ffffff;font-size:20px;font-weight:800;letter-spacing:.3px;">
      Rayna Tours
    </div>
    <div style="padding:26px 24px;color:#222222;line-height:1.6;">
      <p style="font-size:17px;font-weight:700;margin:0 0 10px;">Welcome, {{customer_name}} 🌴</p>
      <p style="font-size:14px;margin:0 0 18px;color:#444444;">
        Thanks for stopping by! We've got handpicked tours, tickets and experiences
        waiting for you. Whenever you're ready, we're here to help you plan something unforgettable.
      </p>
      <a href="{{cta_url}}" style="display:inline-block;background:#8b5cf6;color:#ffffff;text-decoration:none;padding:12px 22px;border-radius:8px;font-weight:700;font-size:14px;">
        Explore experiences →
      </a>
      <p style="font-size:12px;color:#999999;margin:24px 0 0;">
        You're receiving this because you visited raynatours.com.
      </p>
    </div>
  </div>
</body>
</html>
