version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-5433}:5432"
    environment:
      POSTGRES_DB: rayna_data_pipe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS env variable is required}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - ./backend/service-account.json:/app/service-account.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL env variable is required}
    restart: unless-stopped
    ports:
      - "5176:3000"
    depends_on:
      - backend

volumes:
  pgdata:
